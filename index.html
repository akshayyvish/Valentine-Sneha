<!DOCTYPE html>
<html>
<head>
  <title>For Sneha ❤️</title>
  <style>
    body {
      text-align: center;
      background: linear-gradient(to right, #ff9a9e, #fecfef);
      font-family: Arial;
      overflow: hidden;
    }

    h1 {
      margin-top: 100px;
    }

    button {
      padding: 12px 25px;
      font-size: 18px;
      margin: 10px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
    }

    #yes {
      background-color: #ff4d6d;
      color: white;
    }

    #no {
      position: absolute;
      background-color: gray;
      color: white;
    }
  </style>
</head>

<body>

  <h1>Sneha Mehra, will you be my Valentine? ❤️</h1>

  <button id="yes" onclick="yesClicked()">Yes ❤️</button>
  <button id="no">No 😏</button>

<script>
const noBtn = document.getElementById("no");

// No button bhaagega
noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("touchstart", moveButton);

function moveButton() {
  const x = Math.random() * (window.innerWidth - 100);
  const y = Math.random() * (window.innerHeight - 50);

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
}

// YES click hone ke baad
function yesClicked() {
  document.body.innerHTML = `
    <h1 style="margin-top:150px; color:white;">Yayyy Sneha ❤️😍</h1>
    <p style="color:white; font-size:20px;">Ab tum officially meri Valentine ho 😎💖</p>
  `;

  document.body.style.background = "black";

  // Hearts rain animation
  setInterval(() => {
    let heart = document.createElement("div");
    heart.innerHTML = "❤️";
    heart.style.position = "absolute";
    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.top = "-20px";
    heart.style.fontSize = "24px";
    heart.style.animation = "fall 3s linear";

    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 3000);
  }, 200);
}

// Animation CSS
let style = document.createElement('style');
style.innerHTML = `
@keyframes fall {
  to {
    transform: translateY(100vh);
  }
}
`;
document.head.appendChild(style);

</script>

</body>
</html>
